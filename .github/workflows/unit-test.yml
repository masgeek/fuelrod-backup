name: Unit Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'fuelrod_backup/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    concurrency:
      group: test-py${{ matrix.python-version }}-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          # cache-read-only: feature branches read from cache but never write,
          # so only develop keeps the shared cache warm.
          key: venv-${{ matrix.python-version }}-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest -v --tb=short --junitxml=test-results.xml

      - name: Smoke-test CLI entry point
        run: poetry run fuelrod-backup --help

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 1
