name: PR Checks

on:
  push:
    branches: [ main, develop ]
    paths:
      - "fuelrod_backup/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    concurrency:
      group: lint-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-lint-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install

      - name: Lint with ruff
        run: poetry run ruff check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [ lint ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.13" ]
    concurrency:
      group: test-py${{ matrix.python-version }}-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ matrix.python-version }}-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest -v --tb=short --junitxml=test-results.xml

      - name: Smoke-test CLI entry point
        run: poetry run fuelrod-backup --help

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 1

  review-pr:
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Approve or Request Changes
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const conclusion = context.payload.workflow_run.conclusion;
            const headSha = context.payload.workflow_run.head_sha;
      
            // Find the PR by commit SHA since pull_requests[] is often empty
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.payload.workflow_run.head_repository.owner.login}:${context.payload.workflow_run.head_branch}`
            });
      
            const pr = prs.find(p => p.head.sha === headSha);
            if (!pr) {
              core.warning(`No open PR found for SHA ${headSha}`);
              return;
            }
      
            const event = conclusion === 'success' ? 'APPROVE' : 'REQUEST_CHANGES';
            const body = conclusion === 'success'
              ? '✅ Auto approved after successful Lint and Unit Tests.'
              : `❌ Checks failed (${conclusion}). Please fix before merging.`;
      
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event,
              body
            });
      
            core.info(`${event} review posted on PR #${pr.number}`);