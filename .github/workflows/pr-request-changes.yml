name: Request Changes on Failure

on:
  workflow_run:
    workflows: ["PR Checks"]
    types: [completed]

jobs:
  request-changes:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      (github.event.workflow_run.event == 'pull_request' || github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Request changes on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const run = context.payload.workflow_run;
            let prNumber = run.pull_requests?.[0]?.number;

            if (!prNumber) {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${run.head_repository.owner.login}:${run.head_branch}`
              });
              prNumber = prs.find(p => p.head.sha === run.head_sha)?.number;
            }

            if (!prNumber) {
              core.warning(`No open PR found for SHA ${run.head_sha}`);
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'REQUEST_CHANGES',
              body: `❌ Checks failed (\`${run.conclusion}\`). Please fix before merging.`
            });

            core.info(`REQUEST_CHANGES posted on PR #${prNumber}`);