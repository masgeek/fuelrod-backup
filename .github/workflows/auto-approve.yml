name: Auto Approve or Request Changes

on:
  workflow_run:
    workflows: [ "PR Checks" ]
    types: [ completed ]

jobs:
  review-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Approve or Request Changes
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const conclusion = context.payload.workflow_run.conclusion;
            const pr = context.payload.workflow_run.pull_requests[0];
            if (!pr) {
              core.info("No PR associated with this workflow run.");
              return;
            }

            if (conclusion === 'success') {
              await github.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: 'APPROVE',
                body: '✅ Auto approved after successful Lint and Unit Tests.'
              });
            } else {
              await github.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: 'REQUEST_CHANGES',
                body: `❌ Checks failed (${conclusion}). Please fix before merging.`
              });
            }