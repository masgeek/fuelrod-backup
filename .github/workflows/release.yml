name: Release

on:
  pull_request:
    branches:
      - main
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Tag → version → build → publish
    runs-on: ubuntu-latest
    # Run only when a PR is actually merged into main, or on manual dispatch from main.
    # Prevents accidental releases from closed-but-not-merged PRs.
    if: |
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event.pull_request.merged == true)
    # Fixed group (not branch-scoped) so ALL release runs are serialised globally.
    # Two PRs merged in quick succession will queue, not race — the second run will
    # see the tag created by the first and compute the correct next version.
    # cancel-in-progress: false because a partial release (tagged but not published)
    # is harder to recover from than waiting for the queue to drain.
    concurrency:
      group: release
      cancel-in-progress: false
    environment: pypi

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is required - the tag action needs full commit history
          # and all existing tags to compute the next semver bump correctly.
          fetch-depth: 0
          # App token allows the version-bump commit to push back to main without
          # violating branch protection. Requires the app to be granted
          # "bypass branch protection" under Settings -> Branches -> main rule.
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch tags
        run: git fetch --tags

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install

      - name: Lint
        run: poetry run ruff check .

      - name: Test
        run: poetry run pytest -q

      - name: Generate tag
        id: tag_version
        uses: masgeek/github-tag-action@release
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          tag_prefix: ""
          create_annotated_tag: true

      - name: Sync pyproject.toml version to tag
        # Keeps the version in pyproject.toml consistent with the Git tag so that
        # the published PyPI wheel and sdist carry the correct version string.
        run: poetry version ${{ steps.tag_version.outputs.new_tag }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml

          # Stash the version bump, rebase on latest main, then reapply.
          # Guards against main moving between our checkout and this push
          # (e.g. a chore commit from a preceding serialised release run).
          git stash push -m "version bump"
          git pull --rebase origin main
          git stash pop

          git commit -m "chore: release ${{ steps.tag_version.outputs.new_tag }}"
          git push origin HEAD:main

      - name: Build
        run: poetry build

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.21.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          artifacts: "dist/*"
          makeLatest: true
          allowUpdates: true

      - name: Publish to PyPI
        run: poetry publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
