name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write  # push commit + tag

jobs:
  release:
    name: Bump → tag → build → publish
    runs-on: ubuntu-latest
    environment: pypi  # optional: add a GitHub environment for approval gate

    steps:
      - uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN can push to main if branch protection allows it.
          # If your branch is protected, replace with a PAT stored as a secret:
          #   token: ${{ secrets.RELEASE_PAT }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install

      - name: Lint
        run: poetry run ruff check .

      - name: Test
        run: poetry run pytest -q

      - name: Bump version (${{ inputs.bump }})
        run: poetry version ${{ inputs.bump }}

      - name: Read new version
        id: version
        run: echo "value=$(poetry version --short)" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: release ${{ steps.version.outputs.value }}"
          git tag -a "${{ steps.version.outputs.value }}" \
              -m "Release ${{ steps.version.outputs.value }}"
          git push origin HEAD:main --follow-tags

      - name: Build
        run: poetry build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Release ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: dist/*

      - name: Publish to PyPI
        run: poetry publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
